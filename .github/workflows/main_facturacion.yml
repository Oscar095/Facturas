# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
#
# Este workflow construye la imagen Docker del repo (Dockerfile en la raíz),
# la publica en GitHub Container Registry (ghcr.io) y la despliega en el
# Azure Web App "facturacion" usando un "publish profile" (secreto
# AZURE_WEBAPP_PUBLISH_PROFILE), sin OIDC.

name: Build and deploy container to Azure Web App - facturacion

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/oscar095/facturas

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # Autenticación por "publish profile" (secreto AZURE_WEBAPP_PUBLISH_PROFILE)
      # en vez de OIDC/azure-login. Le decimos al Web App que descargue la imagen
      # recién publicada en GHCR.
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'facturacion'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.IMAGE_NAME }}:${{ github.sha }}
