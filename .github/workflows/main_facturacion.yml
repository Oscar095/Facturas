# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
#
# Este workflow construye la imagen Docker del repo (Dockerfile en la raíz),
# la publica en GitHub Container Registry (ghcr.io) y la despliega en el
# Azure Web App "facturacion". Reemplaza al workflow "Python app" que Azure
# genera por defecto (Oryx + pip install), que no sirve aquí porque el
# proyecto necesita compilar el frontend y system deps (ODBC, Playwright)
# que solo el Dockerfile instala.

name: Build and deploy container to Azure Web App - facturacion

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/oscar095/facturas

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9AB2066344EE49C194E556682FAE9B35 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D0318C5141FC426081DE217D73DD563F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F1DD955A3F004F9FAFA00E3FD80A1D0B }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'facturacion'
          slot-name: 'Production'
          images: ${{ env.IMAGE_NAME }}:${{ github.sha }}
